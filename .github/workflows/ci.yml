name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Build frontend
        run: npm run build

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test -- --runInBand

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Start PostgreSQL with Docker Compose
        working-directory: .
        run: docker-compose up -d postgres

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Checking PostgreSQL container status..."
          docker ps | grep postgres
          echo ""
          echo "PostgreSQL logs:"
          docker logs desperate_postgres || echo "No logs yet"
          echo ""
          echo "Attempting to connect to PostgreSQL..."
          for i in {1..60}; do
            echo "Attempt $i/60..."
            if docker exec desperate_postgres pg_isready -U postgres -d desperate_db > /dev/null 2>&1; then
              echo "✓ PostgreSQL is ready!"
              exit 0
            fi
            echo "PostgreSQL not ready yet, retrying..."
            sleep 1
          done
          echo "✗ PostgreSQL failed to start"
          docker logs desperate_postgres
          exit 1
        working-directory: .

      - name: Run e2e tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: desperate_db
        run: npm run test:e2e

      - name: Build backend
        run: npm run build

      - name: Stop Docker services
        if: always()
        run: docker-compose down
        working-directory: .