name: Backend Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy backend to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/ec2_deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
            set -euo pipefail
            cd "${{ secrets.EC2_APP_DIR }}"
            git fetch origin master
            git checkout master
            git pull --ff-only origin master
            docker compose -f docker-compose.prod.yaml up -d --build backend
            docker compose -f docker-compose.prod.yaml ps
          EOF

      - name: Verify backend health
        run: |
          ssh -i ~/.ssh/ec2_deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
            set -euo pipefail
            curl --fail --silent --show-error http://127.0.0.1:4000/health
          EOF
